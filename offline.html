<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <meta name="theme-color" content="#0f5f5c">
    <title>DMovel offline</title>
    <style>
      body { margin: 0; min-height: 100vh; display: grid; place-items: center;
        font: 16px system-ui, sans-serif; background: #121212; color: #fff; }
      main { max-width: 32rem; padding: 2rem; text-align: center; }
      button { padding: .75rem 1rem; border: 0; border-radius: .5rem;
        background: #76a5dc; color: #081018; font-weight: 700; }
    </style>
  </head>
  <body>
    <main>
      <h1>DMovel está offline</h1>
      <p>A primeira preparação offline ainda não terminou. Reconecte-se e abra o DMovel novamente.</p>
      <button type="button" onclick="location.reload()">Tentar novamente</button>
    </main>
  </body>
</html>
