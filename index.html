  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="/dmovel_web_app/">

  <script>
    (function () {
      const base = document.querySelector('base');
      if (base && base.getAttribute('href') === '/dmovel_web_app/') {
        base.setAttribute('href', '/dmovel_web_app/');
      }
    })();
  </script>

  <link rel="manifest" href="manifest.json">

  <!-- PWA Install Prompt Capture -->
  <script>
    window.deferredPwaPrompt = null;
    window.addEventListener('beforeinstallprompt', function(e) {
      e.preventDefault();
      window.deferredPwaPrompt = e;
      console.log('[PWA] beforeinstallprompt captured');
    });
    window.addEventListener('appinstalled', function() {
      console.log('[PWA] App installed');
      window.deferredPwaPrompt = null;
    });
    window.triggerPwaInstall = function() {
      if (window.deferredPwaPrompt) {
        window.deferredPwaPrompt.prompt();
        window.deferredPwaPrompt.userChoice.then(function(result) {
          console.log('[PWA] User choice: ' + result.outcome);
          window.deferredPwaPrompt = null;
        });
        return true;
      }
      return false;
    };
    window.isPwaInstallAvailable = function() {
      return window.deferredPwaPrompt !== null;
    };

    // Indicates whether the app is currently running as an installed PWA.
    // Browsers expose display-mode media queries and on iOS the `navigator.standalone` flag.
    window.isPwaInstalled = function() {
      return (window.matchMedia && window.matchMedia('(display-mode: standalone)').matches) ||
             (window.navigator && window.navigator.standalone === true);
    };
  </script>
